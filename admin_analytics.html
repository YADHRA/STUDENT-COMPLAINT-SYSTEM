<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Analytics | sol2com</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #240046, #3c096c, #7f5af0);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .top-nav {
            text-align: right;
            margin-bottom: 25px;
        }

        .top-nav a {
            color: #f1c6ff;
            text-decoration: none;
            margin-left: 15px;
            font-weight: 600;
        }

        .logout-btn {
            background: #9d4edd;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
        }

        h2 {
            margin-bottom: 25px;
            text-align: center;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(14px);
            padding: 25px;
            border-radius: 22px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(0,0,0,0.35);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 18px;
            opacity: 0.9;
        }

        .count {
            font-size: 36px;
            font-weight: 700;
        }

        .green { color: #38b000; }
        .yellow { color: #ffb703; }
        .blue { color: #4cc9f0; }
        .pink { color: #f72585; }

        .footer-note {
            margin-top: 35px;
            text-align: center;
            opacity: 0.85;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- NAV -->
    <div class="top-nav">
        <a href="/admin">Dashboard</a>
        <a href="/profile">Profile</a>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <h2>📊 Admin Analytics Dashboard</h2>

    <div class="stats">
        <div class="card">
            <h3>Total Complaints</h3>
            <div class="count">{{ total }}</div>
        </div>

        <div class="card">
            <h3>Pending</h3>
            <div class="count yellow">{{ pending }}</div>
        </div>

        <div class="card">
            <h3>In Progress</h3>
            <div class="count blue">{{ inprogress }}</div>
        </div>

        <div class="card">
            <h3>Solved</h3>
            <div class="count green">{{ solved }}</div>
        </div>

        <div class="card">
            <h3>Total Students</h3>
            <div class="count pink">{{ students }}</div>
        </div>
    </div>

    <div class="footer-note">
        sol2com — Turning complaints into solutions ✨
    </div>

</div>

</body>
</html>
