<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | sol2com</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #7f5af0, #3c096c, #240046);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            padding: 45px;
            width: 480px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,.45);
            text-align: center;
        }

        h1 {
            font-size: 40px;
            color: #e0aaff;
            margin-bottom: 8px;
        }

        .role {
            font-size: 20px;
            color: #f1c6ff;
            margin-bottom: 30px;
            text-transform: capitalize;
        }

        .stat {
            background: rgba(255,255,255,0.18);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            font-size: 18px;
            color: #fdf4ff;
        }

        .stat strong {
            font-size: 20px;
            color: #ffddff;
        }

        .btn {
            margin-top: 25px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #7f5af0, #9d4edd);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="card">
    <h1>{{ username }}</h1>
    <div class="role">{{ role }} Profile</div>

    {% if role == "student" %}
        <div class="stat">📄 Total Complaints: <strong>{{ total }}</strong></div>
        <div class="stat">✅ Resolved: <strong>{{ solved }}</strong></div>
        <div class="stat">⏳ Pending: <strong>{{ pending }}</strong></div>
    {% else %}
        <div class="stat">🛠 Total Complaints Handled: <strong>{{ total_handled }}</strong></div>
    {% endif %}

    <a href="/">
        <button class="btn">⬅ Back</button>
    </a>
</div>

</body>
</html>
