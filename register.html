<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | sol2com</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #7f5af0, #3c096c, #240046);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            width: 380px;
            padding: 35px;
            border-radius: 22px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            animation: fadeUp 0.9s ease;
        }

        h2 {
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 700;
        }

        .tagline {
            font-size: 15px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #7f5af0, #9d4edd);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        .thankyou {
            margin-top: 20px;
            font-size: 16px;
            background: rgba(255,255,255,0.18);
            padding: 12px;
            border-radius: 18px;
            animation: fadeIn 0.6s ease;
        }

        a {
            color: #e0aaff;
            text-decoration: none;
            font-size: 14px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Student Registration</h2>
    <div class="tagline">Register once. Raise issues with confidence.</div>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <!-- ✅ THANK YOU MESSAGE -->
    {% if username %}
        <div class="thankyou">
            🎉 Thank you <strong>{{ username }}</strong> for registering with <b>sol2com</b>!
        </div>
    {% endif %}

    <br>
    <a href="/login">Already registered? Login</a>
</div>

</body>
</html>
