<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sol2com | Student Complaint System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #7f5af0, #3c096c, #240046);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            padding: 45px 40px;
            width: 420px;
            border-radius: 24px;
            text-align: center;
            color: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.45);
            animation: slideUp 1s ease;
        }

        .logo {
            font-size: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4));
        }

        h1 {
            font-size: 46px;
            margin: 5px 0;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .tagline {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 32px;
            opacity: 0.95;
        }

        .features {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
        }

        .feature {
            width: 30%;
            font-size: 14px;
            opacity: 0.9;
        }

        .feature span {
            display: block;
            font-size: 24px;
            margin-bottom: 6px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .login-btn {
            background: linear-gradient(135deg, #7f5af0, #9d4edd);
            color: white;
        }

        .register-btn {
            background: white;
            color: #5a189a;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0,0,0,0.35);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="logo">🛠️</div>
    <h1>sol2com</h1>

    <div class="tagline">
        From problem to solution — smooth & simple.
    </div>

    <div class="features">
        <div class="feature">
            <span>⚡</span>
            Fast Resolution
        </div>
        <div class="feature">
            <span>🔒</span>
            Secure System
        </div>
        <div class="feature">
            <span>📊</span>
            Transparent Tracking
        </div>
    </div>

    <!-- 🔹 Login & Register -->
    <div class="buttons">
        <a href="/login">
            <button class="btn login-btn">Login</button>
        </a>
        <a href="/register">
            <button class="btn register-btn">Register</button>
        </a>
    </div>

    <!-- 🔹 About & Profile -->
    <div class="buttons" style="margin-top:15px">
        <a href="/about">
            <button class="btn login-btn">About</button>
        </a>
        <a href="/profile">
            <button class="btn register-btn">Profile</button>
        </a>
    </div>

</div>

</body>
</html>
