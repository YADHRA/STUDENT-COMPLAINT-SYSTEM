<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | sol2com</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(120deg,#240046,#3c096c,#5a189a);
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    width:420px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    border-radius:25px;
    padding:45px;
    color:#fff;
    box-shadow:0 25px 60px rgba(0,0,0,0.4);
    animation:slideUp .9s ease;
}

.logo{
    text-align:center;
    font-size:42px;
    font-weight:700;
    letter-spacing:3px;
}

.tagline{
    text-align:center;
    margin-top:6px;
    font-size:14px;
    opacity:.85;
}

.form-group{
    position:relative;
    margin-top:30px;
}

.form-group input{
    width:100%;
    padding:14px 18px;
    background:transparent;
    border:2px solid rgba(255,255,255,.3);
    border-radius:30px;
    outline:none;
    color:white;
    font-size:15px;
}

.form-group label{
    position:absolute;
    top:50%;
    left:18px;
    transform:translateY(-50%);
    color:#ddd;
    font-size:14px;
    pointer-events:none;
    transition:.3s;
    background:#3c096c;
    padding:0 8px;
}

.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label{
    top:-6px;
    font-size:12px;
    color:#ffd6ff;
}

button{
    width:100%;
    margin-top:35px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#9d4edd,#c77dff);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(0,0,0,.4);
}

.links{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.links a{
    color:#ffd6ff;
    text-decoration:none;
}

.flash{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#ffccd5;
}

@keyframes slideUp{
    from{opacity:0;transform:translateY(40px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">sol2com</div>
    <div class="tagline">Your issue, our mission</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <input type="text" name="username" required placeholder=" ">
            <label>Username</label>
        </div>

        <div class="form-group">
            <input type="password" name="password" required placeholder=" ">
            <label>Password</label>
        </div>

        <button type="submit">Login Securely</button>
    </form>

    <div class="links">
        New user? <a href="/register">Create account</a>
    </div>
</div>

</body>
</html>
